<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
body { margin:0; background:#111; color:#fff; }
.controls { padding:10px; background:#222; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;}
.viewer { display:flex; justify-content:center; align-items:center; height:90vh;}
img { max-width:100%; max-height:100%; object-fit:contain; }
</style>
</head>

<body>

<div class="controls">
<button onclick="login()">ログイン</button>

<select id="folderSelect"></select>

<label>間隔</label>
<input type="range" id="interval" min="1" max="5" value="3">
<span id="sec">3秒</span>

<button onclick="start()">開始</button>
<button onclick="stop()">停止</button>
</div>

<div class="viewer">
<img id="img">
</div>

<script src="https://accounts.google.com/gsi/client"></script>

<script>
const CLIENT_ID = "994066302584-29k54ve6eivqbgiskgvaj3d8k2n6tbsi.apps.googleusercontent.com";
const ROOT_ID = "1iZGU-qytQAtWkCbWpXA_CIFHVcxApXh1";

let token;
let foldersWithImages = [];
let images = [];
let index = 0;
let timer;

const select = document.getElementById("folderSelect");
const interval = document.getElementById("interval");
const sec = document.getElementById("sec");

interval.oninput = () => {
  sec.textContent = interval.value + "秒";
  if(timer) restart();
};

const tokenClient = google.accounts.oauth2.initTokenClient({
  client_id: CLIENT_ID,
  scope: "https://www.googleapis.com/auth/drive.readonly",
  callback: async (res) => {
    token = res.access_token;
    alert("ログイン成功");
    await scanFolders(ROOT_ID);
    renderSelect();
  }
});

function login(){
  tokenClient.requestAccessToken();
}

// フォルダ探索
async function scanFolders(folderId){
  // 子フォルダ
  const folderRes = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and mimeType='application/vnd.google-apps.folder'`,
    { headers:{ Authorization:"Bearer "+token } }
  );
  const folders = (await folderRes.json()).files || [];

  // 画像チェック
  const imgRes = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and mimeType contains 'image/'`,
    { headers:{ Authorization:"Bearer "+token } }
  );
  const imgs = (await imgRes.json()).files || [];

  // ★「画像があって子フォルダがない」＝最下層
  if(imgs.length > 0 && folders.length === 0){
    foldersWithImages.push({
      id: folderId,
      name: folderId
    });
  }

  // 再帰
  for(const f of folders){
    await scanFolders(f.id);
  }
}

// セレクト表示
function renderSelect(){
  select.innerHTML = "";
  foldersWithImages.forEach(f=>{
    const op = document.createElement("option");
    op.value = f.id;
    op.textContent = f.name;
    select.appendChild(op);
  });
}

// 画像取得（順番維持）
async function getImages(folderId){
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and mimeType contains 'image/'&orderBy=name`,
    { headers:{ Authorization:"Bearer "+token } }
  );
  return (await res.json()).files || [];
}

async function start(){
  images = await getImages(select.value);

  if(images.length === 0){
    alert("画像なし");
    return;
  }

  index = 0;
  show();
  restart();
}

async function show(){
  const id = images[index].id;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
    { headers:{ Authorization:"Bearer "+token } }
  );

  const blob = await res.blob();
  document.getElementById("img").src = URL.createObjectURL(blob);

  index = (index + 1) % images.length;
}

function restart(){
  clearInterval(timer);
  timer = setInterval(show, interval.value * 1000);
}

function stop(){
  clearInterval(timer);
}
</script>

</body>
</html>
