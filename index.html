<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Slideshow</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }
    .controls {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1e1e1e;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #333;
    }
    button, select, input {
      font-size: 16px;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      cursor: pointer;
    }
    #status {
      padding: 10px;
      text-align: center;
      color: #ddd;
      min-height: 2.5em;
    }
    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 130px);
      padding: 8px;
    }
    #img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 10px;
    }
    .small {
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="loginBtn" type="button">ログイン</button>

    <label for="folderSelect" class="small">フォルダ</label>
    <select id="folderSelect">
      <option value="">ログイン後に読み込み</option>
    </select>

    <label for="interval" class="small">間隔</label>
    <input type="range" id="interval" min="1" max="5" step="1" value="3">
    <span id="sec">3秒</span>

    <button id="startBtn" type="button">開始</button>
    <button id="stopBtn" type="button">停止</button>
    <button id="fullBtn" type="button">全画面</button>
  </div>

  <div id="status">待機中</div>

  <div class="viewer" id="viewer">
    <img id="img" alt="slideshow image">
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    (() => {
      "use strict";

      const CLIENT_ID = "994066302584-29k54ve6eivqbgiskgvaj3d8k2n6tbsi.apps.googleusercontent.com";
      const ROOT_ID = "1iZGU-qytQAtWkCbWpXA_CIFHVcxApXh1";

      let token = null;
      let foldersWithImages = [];
      let images = [];
      let index = 0;
      let timer = null;
      let objectUrl = null;
      let tokenClient = null;

      const loginBtn = document.getElementById("loginBtn");
      const folderSelect = document.getElementById("folderSelect");
      const interval = document.getElementById("interval");
      const sec = document.getElementById("sec");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const fullBtn = document.getElementById("fullBtn");
      const img = document.getElementById("img");
      const viewer = document.getElementById("viewer");
      const statusEl = document.getElementById("status");

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function stop() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function restart() {
        stop();
        timer = setInterval(() => {
          show().catch(err => {
            console.error(err);
            setStatus("再生中にエラー");
            stop();
          });
        }, Number(interval.value) * 1000);
      }

      interval.addEventListener("input", () => {
        sec.textContent = interval.value + "秒";
        if (timer) restart();
      });

      async function apiListAll(query, orderBy = "") {
        let all = [];
        let pageToken = "";

        while (true) {
          let url =
            "https://www.googleapis.com/drive/v3/files" +
            `?q=${encodeURIComponent(query)}` +
            `&fields=${encodeURIComponent("files(id,name),nextPageToken")}` +
            `&pageSize=1000`;

          if (orderBy) {
            url += `&orderBy=${encodeURIComponent(orderBy)}`;
          }
          if (pageToken) {
            url += `&pageToken=${encodeURIComponent(pageToken)}`;
          }

          const res = await fetch(url, {
            headers: { Authorization: "Bearer " + token }
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error("Drive API error: " + text);
          }

          const data = await res.json();
          all = all.concat(data.files || []);
          if (!data.nextPageToken) break;
          pageToken = data.nextPageToken;
        }

        return all;
      }

      async function getChildFolders(folderId) {
        const q = `'${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
        return await apiListAll(q, "name");
      }

      async function getImagesInFolder(folderId) {
        const q = `'${folderId}' in parents and mimeType contains 'image/' and trashed=false`;
        return await apiListAll(q, "name");
      }

      async function scanFolders(folderId, path) {
        setStatus("探索中: " + path);

        const childFolders = await getChildFolders(folderId);
        const imgs = await getImagesInFolder(folderId);

        if (imgs.length > 0 && childFolders.length === 0) {
          foldersWithImages.push({
            id: folderId,
            name: path
          });
        }

        for (const folder of childFolders) {
          await scanFolders(folder.id, `${path} / ${folder.name}`);
        }
      }

      function renderSelect() {
        folderSelect.innerHTML = "";

        if (foldersWithImages.length === 0) {
          const op = document.createElement("option");
          op.value = "";
          op.textContent = "該当フォルダなし";
          folderSelect.appendChild(op);
          return;
        }

        for (const f of foldersWithImages) {
          const op = document.createElement("option");
          op.value = f.id;
          op.textContent = f.name;
          folderSelect.appendChild(op);
        }
      }

      async function show() {
        if (!images.length) return;

        const file = images[index];
        const res = await fetch(
          `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
          { headers: { Authorization: "Bearer " + token } }
        );

        if (!res.ok) {
          const text = await res.text();
          throw new Error("画像取得失敗: " + text);
        }

        const blob = await res.blob();

        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(blob);
        img.src = objectUrl;

        index = (index + 1) % images.length;
      }

      async function start() {
        if (!token) {
          alert("先にログインしてね");
          return;
        }

        const folderId = folderSelect.value;
        if (!folderId) {
          alert("フォルダがまだ選べない状態");
          return;
        }

        setStatus("画像を読み込み中...");
        images = await getImagesInFolder(folderId);

        images.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" })
        );

        if (images.length === 0) {
          setStatus("このフォルダに画像がない");
          alert("画像なし");
          return;
        }

        index = 0;
        await show();
        restart();
        setStatus(`${images.length}枚を再生中`);
      }

      async function loadFoldersAfterLogin() {
        foldersWithImages = [];
        folderSelect.innerHTML = '<option value="">読み込み中...</option>';
        setStatus("フォルダ構造を読み込み中...");

        await scanFolders(ROOT_ID, "親フォルダ");
        foldersWithImages.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" })
        );
        renderSelect();

        if (foldersWithImages.length === 0) {
          setStatus("画像入りの最下層フォルダが見つからない");
        } else {
          setStatus(`読み込み完了: ${foldersWithImages.length}個のフォルダ`);
        }
      }

      function initAuth() {
        if (!window.google || !google.accounts || !google.accounts.oauth2) {
          setStatus("Google認証ライブラリの読み込み失敗");
          return;
        }

        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.readonly",
          callback: async (res) => {
            try {
              token = res.access_token;
              setStatus("ログイン成功。フォルダ読込開始...");
              await loadFoldersAfterLogin();
            } catch (e) {
              console.error(e);
              setStatus("ログイン後の読込に失敗");
              alert("ログイン後の読み込みに失敗した");
            }
          }
        });
      }

      loginBtn.addEventListener("click", () => {
        try {
          if (!tokenClient) {
            initAuth();
          }
          if (!tokenClient) return;
          tokenClient.requestAccessToken();
        } catch (e) {
          console.error(e);
          setStatus("ログイン開始に失敗");
          alert("ログイン開始に失敗した");
        }
      });

      startBtn.addEventListener("click", () => {
        start().catch(err => {
          console.error(err);
          setStatus("開始時にエラー");
          alert("開始時にエラーが出た");
        });
      });

      stopBtn.addEventListener("click", stop);

      fullBtn.addEventListener("click", async () => {
        try {
          if (!document.fullscreenElement) {
            await viewer.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (e) {
          console.error(e);
          alert("全画面に失敗");
        }
      });

      window.addEventListener("load", () => {
        sec.textContent = interval.value + "秒";
        setStatus("ページ読込完了。ログインしてね");
        initAuth();
      });

      window.addEventListener("error", (e) => {
        console.error("window error:", e.error || e.message);
        setStatus("ページエラーが発生");
      });
    })();
  </script>
</body>
</html>
