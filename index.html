<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Slideshow</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1e1e1e;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #333;
    }

    button, select, input {
      font-size: 16px;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    #status {
      padding: 10px;
      text-align: center;
      color: #ddd;
      min-height: 2.5em;
    }

    #path {
      padding: 0 12px 12px;
      color: #bbb;
      font-size: 14px;
      word-break: break-word;
      text-align: center;
    }

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 180px);
      padding: 8px;
    }

    #img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="loginBtn" type="button">ログイン</button>
    <button id="backBtn" type="button">戻る</button>

    <select id="folderSelect">
      <option value="">ログイン後に読み込み</option>
    </select>

    <button id="openBtn" type="button">開く</button>

    <label for="interval">間隔</label>
    <input type="range" id="interval" min="1" max="5" step="1" value="3">
    <span id="sec">3秒</span>

    <button id="startBtn" type="button">開始</button>
    <button id="stopBtn" type="button">停止</button>
    <button id="fullBtn" type="button">全画面</button>
  </div>

  <div id="status">待機中</div>
  <div id="path">現在地: 未ログイン</div>

  <div class="viewer" id="viewer">
    <img id="img" alt="slideshow image">
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    (() => {
      "use strict";

      const CLIENT_ID = "994066302584-29k54ve6eivqbgiskgvaj3d8k2n6tbsi.apps.googleusercontent.com";
      const ROOT_ID = "1iZGU-qytQAtWkCbWpXA_CIFHVcxApXh1";

      let token = null;
      let tokenClient = null;

      let timer = null;
      let objectUrl = null;
      let slideshowImages = [];
      let slideshowIndex = 0;

      // 現在の階層
      let currentFolderId = ROOT_ID;
      let currentPathNames = ["親フォルダ"];

      // キャッシュ
      const folderCache = new Map(); // folderId -> [{id,name}]
      const imageCache = new Map();  // folderId -> [{id,name}]

      const loginBtn = document.getElementById("loginBtn");
      const backBtn = document.getElementById("backBtn");
      const openBtn = document.getElementById("openBtn");
      const folderSelect = document.getElementById("folderSelect");
      const interval = document.getElementById("interval");
      const sec = document.getElementById("sec");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const fullBtn = document.getElementById("fullBtn");
      const statusEl = document.getElementById("status");
      const pathEl = document.getElementById("path");
      const viewer = document.getElementById("viewer");
      const img = document.getElementById("img");

      // 履歴
      const navStack = [];

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function updatePath() {
        pathEl.textContent = "現在地: " + currentPathNames.join(" / ");
      }

      function stopSlideshow() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function restartSlideshow() {
        stopSlideshow();
        timer = setInterval(() => {
          showCurrentImage().catch(err => {
            console.error(err);
            setStatus("再生中にエラー");
            stopSlideshow();
          });
        }, Number(interval.value) * 1000);
      }

      interval.addEventListener("input", () => {
        sec.textContent = interval.value + "秒";
        if (timer) restartSlideshow();
      });

      async function apiListAll(query, orderBy = "name") {
        let all = [];
        let pageToken = "";

        while (true) {
          let url =
            "https://www.googleapis.com/drive/v3/files" +
            `?q=${encodeURIComponent(query)}` +
            `&fields=${encodeURIComponent("files(id,name),nextPageToken")}` +
            `&pageSize=1000`;

          if (orderBy) {
            url += `&orderBy=${encodeURIComponent(orderBy)}`;
          }
          if (pageToken) {
            url += `&pageToken=${encodeURIComponent(pageToken)}`;
          }

          const res = await fetch(url, {
            headers: { Authorization: "Bearer " + token }
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error("Drive API error: " + text);
          }

          const data = await res.json();
          all = all.concat(data.files || []);

          if (!data.nextPageToken) break;
          pageToken = data.nextPageToken;
        }

        return all;
      }

      async function getChildFolders(folderId) {
        if (folderCache.has(folderId)) {
          return folderCache.get(folderId);
        }

        const q = `'${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
        const folders = await apiListAll(q, "name");
        folders.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" })
        );
        folderCache.set(folderId, folders);
        return folders;
      }

      async function getImagesInFolder(folderId) {
        if (imageCache.has(folderId)) {
          return imageCache.get(folderId);
        }

        const q = `'${folderId}' in parents and mimeType contains 'image/' and trashed=false`;
        const images = await apiListAll(q, "name");
        images.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" })
        );
        imageCache.set(folderId, images);
        return images;
      }

      async function renderFolderList(folderId) {
        setStatus("フォルダ情報を読み込み中...");
        folderSelect.innerHTML = '<option value="">読み込み中...</option>';

        const [folders, images] = await Promise.all([
          getChildFolders(folderId),
          getImagesInFolder(folderId)
        ]);

        folderSelect.innerHTML = "";

        for (const folder of folders) {
          const op = document.createElement("option");
          op.value = folder.id;
          op.textContent = "📁 " + folder.name;
          op.dataset.type = "folder";
          folderSelect.appendChild(op);
        }

        for (const image of images) {
          const op = document.createElement("option");
          op.value = image.id;
          op.textContent = "🖼 " + image.name;
          op.dataset.type = "image";
          folderSelect.appendChild(op);
        }

        if (folders.length === 0 && images.length === 0) {
          const op = document.createElement("option");
          op.value = "";
          op.textContent = "空のフォルダ";
          folderSelect.appendChild(op);
          setStatus("空のフォルダ");
        } else {
          setStatus(`フォルダ ${folders.length}件 / 画像 ${images.length}件`);
        }

        updatePath();
      }

      async function openSelectedFolder() {
        const selected = folderSelect.selectedOptions[0];
        if (!selected) {
          alert("何か選んでね");
          return;
        }

        if (selected.dataset.type !== "folder") {
          alert("フォルダを選んでから開いてね");
          return;
        }

        navStack.push({
          folderId: currentFolderId,
          pathNames: [...currentPathNames]
        });

        currentFolderId = selected.value;
        currentPathNames.push(selected.textContent.replace(/^📁\s*/, ""));

        await renderFolderList(currentFolderId);
      }

      async function goBack() {
        if (navStack.length === 0) {
          alert("これ以上戻れない");
          return;
        }

        const prev = navStack.pop();
        currentFolderId = prev.folderId;
        currentPathNames = [...prev.pathNames];

        await renderFolderList(currentFolderId);
      }

      async function startSlideshow() {
        if (!token) {
          alert("先にログインしてね");
          return;
        }

        const images = await getImagesInFolder(currentFolderId);

        if (!images.length) {
          alert("このフォルダ直下に画像がない");
          setStatus("このフォルダ直下に画像がない");
          return;
        }

        slideshowImages = images;
        slideshowIndex = 0;

        await showCurrentImage();
        restartSlideshow();
        setStatus(`${slideshowImages.length}枚を再生中`);
      }

      async function showCurrentImage() {
        if (!slideshowImages.length) return;

        const file = slideshowImages[slideshowIndex];
        const res = await fetch(
          `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
          { headers: { Authorization: "Bearer " + token } }
        );

        if (!res.ok) {
          const text = await res.text();
          throw new Error("画像取得失敗: " + text);
        }

        const blob = await res.blob();

        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
        }

        objectUrl = URL.createObjectURL(blob);
        img.src = objectUrl;

        slideshowIndex = (slideshowIndex + 1) % slideshowImages.length;
      }

      function initAuth() {
        if (!window.google || !google.accounts || !google.accounts.oauth2) {
          setStatus("Google認証ライブラリの読み込み失敗");
          return;
        }

        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.readonly",
          callback: async (res) => {
            try {
              token = res.access_token;
              currentFolderId = ROOT_ID;
              currentPathNames = ["親フォルダ"];
              navStack.length = 0;
              setStatus("ログイン成功");
              await renderFolderList(ROOT_ID);
            } catch (e) {
              console.error(e);
              setStatus("ログイン後の読み込み失敗");
              alert("ログイン後の読み込みに失敗した");
            }
          }
        });
      }

      loginBtn.addEventListener("click", () => {
        try {
          if (!tokenClient) initAuth();
          tokenClient.requestAccessToken();
        } catch (e) {
          console.error(e);
          setStatus("ログイン開始失敗");
        }
      });

      backBtn.addEventListener("click", () => {
        goBack().catch(err => {
          console.error(err);
          setStatus("戻るでエラー");
        });
      });

      openBtn.addEventListener("click", () => {
        openSelectedFolder().catch(err => {
          console.error(err);
          setStatus("フォルダを開くときにエラー");
        });
      });

      startBtn.addEventListener("click", () => {
        startSlideshow().catch(err => {
          console.error(err);
          setStatus("開始時にエラー");
        });
      });

      stopBtn.addEventListener("click", stopSlideshow);

      fullBtn.addEventListener("click", async () => {
        try {
          if (!document.fullscreenElement) {
            await viewer.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (e) {
          console.error(e);
          alert("全画面に失敗");
        }
      });

      window.addEventListener("load", () => {
        sec.textContent = interval.value + "秒";
        setStatus("ページ読込完了。ログインしてね");
        updatePath();
        initAuth();
      });

      window.addEventListener("error", (e) => {
        console.error("window error:", e.error || e.message);
        setStatus("ページエラー発生");
      });
    })();
  </script>
</body>
</html>
